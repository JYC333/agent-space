services:
  backend:
    build:
      context: ../../core/backend
      dockerfile: Dockerfile
      network: host
    ports:
      - "8000:8000"
    volumes:
      - ../../core/backend/app:/app/app:ro
      - ../../core/backend/alembic.ini:/app/alembic.ini:ro
      - ../../core/backend/migrations:/app/migrations:ro
      - ${AGENT_SPACE_MODE_ROOT:-$HOME/aspace/dev}:/aspace
      - claude-home:/home/agentspace/.claude
    group_add:
      - "${DOCKER_GID:-989}"
    env_file:
      - ${AGENT_SPACE_MODE_ROOT:-$HOME/aspace/dev}/.env
    environment:
      - AGENT_SPACE_HOME=/aspace
      - INSTANCE_ROOT=/aspace
      - STORAGE_ROOT=/aspace/storage
      - LOG_ROOT=/aspace/logs
      - DATABASE_URL=sqlite:////aspace/db/agent_space.sqlite
      - DEPLOYER_SOCKET_PATH=/aspace/run/deployer.sock
      - CLAUDE_HOME=/home/agentspace/.claude
      - AGENT_SPACE_ENV=dev
    working_dir: /app
    command: uvicorn app.main:app --reload --host 0.0.0.0 --port 8000

  frontend:
    build:
      context: ../../frontend
      dockerfile: Dockerfile
      network: host
    ports:
      - "3000:5173"
    volumes:
      - ../../frontend:/app
      - /app/node_modules
    environment:
      - API_URL=http://backend:8000
      - CHOKIDAR_USEPOLLING=true
    depends_on:
      - backend

  deployer:
    build:
      context: ../../deployer
      dockerfile: Dockerfile
      network: host
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ../../:/repo:rw
      - ${AGENT_SPACE_MODE_ROOT:-$HOME/aspace/dev}:/aspace
    user: "1000:989"
    environment:
      - DEPLOYER_SOCKET=/aspace/run/deployer.sock
      - REPO_ROOT=/repo
      - AGENT_SPACE_HOME=/aspace
      - AGENT_SPACE_ENV=dev
    restart: unless-stopped

volumes:
  claude-home:
