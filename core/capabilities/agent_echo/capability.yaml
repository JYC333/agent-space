id: agent.echo
name: Echo Agent
version: "0.1.0"
description: >
  Development and testing capability. Echoes the prompt and context keys
  back as output. Useful for verifying context injection and run logging.

enabled: true

entrypoint:
  type: python_module
  module: capabilities.agent_echo.main
  function: execute

memory_access:
  read:
    - scope: user
      types: [preference, semantic]
  write: []

tools: []

permissions:
  network:
    allow: []
  filesystem:
    read: []
    write: []
  subprocess:
    allow: false

outputs:
  artifact_types:
    - agent.echo.result.v1

validation:
  max_prompt_length: 10000
