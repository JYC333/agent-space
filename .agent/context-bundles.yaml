# Context Bundle Configuration
#
# Maps task types to the minimal set of docs and code roots an agent should load.
# Do not load all bundles for every task — use the smallest relevant set.
#
# Bundles must not reference .agent/reports/ entries — reports are temporary and not source of truth.
# Bundles must not reference stale historical refactor or audit docs.
#
# Usage (future ContextCompiler integration):
#   classifier = TaskClassifier(prompt)
#   bundle = context_bundles[classifier.type]
#   compiler.compile(context, target, task_goal, bundle=bundle)

# ---------------------------------------------------------------------------
# Primary task-type bundles (use these first)
# ---------------------------------------------------------------------------

