<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="con-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#a5acf7" stop-opacity="0.55"/>
      <stop offset="60%"  stop-color="#6366f1" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Frame -->
  <rect width="512" height="512" rx="96" fill="#0f1117"/>
  <rect x="80" y="80" width="352" height="352" rx="48" fill="#15171f" stroke="#2a2d3a" stroke-width="4"/>

  <!-- Radial glow -->
  <circle cx="256" cy="256" r="124" fill="url(#con-glow)"/>

  <!-- Orbit rings -->
  <circle cx="256" cy="256" r="56"  fill="none" stroke="#3a3f52" stroke-width="2"/>
  <circle cx="256" cy="256" r="100" fill="none" stroke="#3a3f52" stroke-width="2" stroke-dasharray="160 24" stroke-dashoffset="40"/>
  <circle cx="256" cy="256" r="148" fill="none" stroke="#2e3242" stroke-width="2" stroke-dasharray="6 14"/>

  <!-- Rays to outer agents -->
  <line x1="256" y1="256" x2="256" y2="108" stroke="#6366f1" stroke-width="2" opacity="0.55"/>
  <line x1="256" y1="256" x2="384" y2="180" stroke="#6366f1" stroke-width="2" opacity="0.45"/>
  <line x1="256" y1="256" x2="396" y2="320" stroke="#6366f1" stroke-width="2" opacity="0.35"/>
  <line x1="256" y1="256" x2="190" y2="396" stroke="#6366f1" stroke-width="2" opacity="0.45"/>
  <line x1="256" y1="256" x2="116" y2="232" stroke="#6366f1" stroke-width="2" opacity="0.55"/>

  <!-- Inner agents (first orbit) -->
  <circle cx="256" cy="200" r="6" fill="#818cf8"/>
  <circle cx="306" cy="280" r="6" fill="#818cf8"/>
  <circle cx="212" cy="288" r="6" fill="#818cf8"/>

  <!-- Mid agents (second orbit — hollow ring) -->
  <circle cx="256" cy="156" r="9" fill="#0f1117" stroke="#6366f1" stroke-width="4"/>
  <circle cx="338" cy="218" r="9" fill="#0f1117" stroke="#6366f1" stroke-width="4"/>
  <circle cx="174" cy="256" r="9" fill="#0f1117" stroke="#6366f1" stroke-width="4"/>
  <circle cx="296" cy="334" r="9" fill="#0f1117" stroke="#6366f1" stroke-width="4"/>

  <!-- Outer agents (third orbit — solid dots) -->
  <circle cx="256" cy="108" r="7" fill="#6366f1"/>
  <circle cx="384" cy="180" r="6" fill="#6366f1"/>
  <circle cx="396" cy="320" r="5" fill="#6366f1"/>
  <circle cx="190" cy="396" r="6" fill="#6366f1"/>
  <circle cx="116" cy="232" r="7" fill="#6366f1"/>

  <!-- Core — Aperture A glyph at the heart -->
  <path d="M 224 296 L 244 232 Q 256 212 268 232 L 288 296"
        fill="none" stroke="#6366f1" stroke-width="14"
        stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="234" y1="270" x2="278" y2="270"
        stroke="#6366f1" stroke-width="14" stroke-linecap="round"/>
  <circle cx="256" cy="270" r="9" fill="#818cf8"/>
</svg>
