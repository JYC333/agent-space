# nginx config for the production frontend image (Dockerfile `prod` stage).
# Serves the Vite-built SPA + PWA assets and proxies the API to the
# server container by its Compose service name.

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # API → server container (the TypeScript backend). depends_on in
    # compose guarantees the `server` service is started before nginx, so
    # the name resolves at config load.
    location /api/ {
        proxy_pass http://server:8010;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        # Some operations (quota PTY refresh, workspace console runs) take 20-30 s.
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # The service worker must never be cached, or clients get stuck on a stale
    # SW and never pick up new deploys.
    location = /sw.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        expires off;
    }

    location = /manifest.webmanifest {
        add_header Cache-Control "no-cache";
        types { } default_type application/manifest+json;
    }

    # Hashed build assets are immutable — cache them aggressively.
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # SPA fallback — let React Router handle client-side routes.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
