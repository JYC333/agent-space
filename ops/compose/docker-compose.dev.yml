services:
  postgres:
    container_name: agent-space-dev-postgres
    image: postgres:${POSTGRES_MAJOR:-18}
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-agent_space}
      - POSTGRES_USER=${POSTGRES_USER:-agent_space}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-agent_space_dev_password}
      - PGDATA=/var/lib/postgresql/data
    volumes:
      - ${AGENT_SPACE_MODE_ROOT:-$HOME/.aspace/dev}/db/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-agent_space} -d ${POSTGRES_DB:-agent_space}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  backend:
    build:
      context: ../../
      dockerfile: backend/Dockerfile
      network: host
      args:
        PG_MAJOR: ${POSTGRES_MAJOR:-18}
    ports:
      - "8000:8000"
    volumes:
      - ../../backend/app:/app/app:ro
      - ../../backend/alembic.ini:/app/alembic.ini:ro
      - ../../backend/migrations:/app/migrations:ro
      - ../../catalog/agent_templates:/app/agent_templates:ro
      - ${AGENT_SPACE_MODE_ROOT:-$HOME/.aspace/dev}:/aspace
    group_add:
      - "${DOCKER_GID:-989}"
    env_file:
      - ${AGENT_SPACE_MODE_ROOT:-$HOME/.aspace/dev}/.env
    environment:
      - AGENT_SPACE_HOME=/aspace
      - INSTANCE_ROOT=/aspace
      - STORAGE_ROOT=/aspace/storage
      - LOG_ROOT=/aspace/logs
      - CAPABILITIES_DIR=/app/capabilities
      - DATABASE_URL=${DATABASE_URL:-postgresql+psycopg://${POSTGRES_USER:-agent_space}:${POSTGRES_PASSWORD:-agent_space_dev_password}@postgres:5432/${POSTGRES_DB:-agent_space}}
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - DEPLOYER_SOCKET_PATH=/aspace/run/deployer.sock
      - CONTROL_PLANE_PROVIDERS_CREDENTIALS_AUTHORITY=${CONTROL_PLANE_PROVIDERS_CREDENTIALS_AUTHORITY:-python}
      - CONTROL_PLANE_RUNS_AUTHORITY=${CONTROL_PLANE_RUNS_AUTHORITY:-python}
      - CONTROL_PLANE_POLICY_AUTHORITY=${CONTROL_PLANE_POLICY_AUTHORITY:-python}
      - CONTROL_PLANE_PROPOSALS_AUTHORITY=${CONTROL_PLANE_PROPOSALS_AUTHORITY:-python}
      - CONTROL_PLANE_SESSIONS_AUTHORITY=${CONTROL_PLANE_SESSIONS_AUTHORITY:-python}
      - CONTROL_PLANE_CHAT_TURN_AUTHORITY=${CONTROL_PLANE_CHAT_TURN_AUTHORITY:-python}
      - CONTROL_PLANE_CONTEXT_AUTHORITY=${CONTROL_PLANE_CONTEXT_AUTHORITY:-python}
      - CONTROL_PLANE_MEMORY_AUTHORITY=${CONTROL_PLANE_MEMORY_AUTHORITY:-python}
      - CONTROL_PLANE_MEMORY_APPLY_AUTHORITY=${CONTROL_PLANE_MEMORY_APPLY_AUTHORITY:-python}
      - CONTROL_PLANE_INTERNAL_URL=${CONTROL_PLANE_INTERNAL_URL:-http://control-plane:8010}
      - CONTROL_PLANE_INTERNAL_TOKEN=${CONTROL_PLANE_INTERNAL_TOKEN:-}
      - AGENT_SPACE_ENV=dev
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      start_period: 180s
      start_interval: 2s
      interval: 30s
      timeout: 5s
      retries: 3
    working_dir: /app
    command: uvicorn app.main:app --reload --host 0.0.0.0 --port 8000

  # Official TS control plane — the default client-facing entrypoint. It serves
  # TS-owned routes and proxies unowned /api/v1/* paths to `backend` (Python).
  control-plane:
    build:
      context: ../../
      dockerfile: control-plane/Dockerfile
      target: dev-runtime
      network: host
    container_name: agent-space-dev-control-plane
    ports:
      - "8010:8010"
    volumes:
      - ../../control-plane/src:/app/control-plane/src:ro
      - ../../control-plane/tsconfig.json:/app/control-plane/tsconfig.json:ro
      - ../../packages/protocol/src:/app/packages/protocol/src:ro
      - ${AGENT_SPACE_MODE_ROOT:-$HOME/.aspace/dev}:/aspace
    environment:
      - AGENT_SPACE_HOME=/aspace
      - CONTROL_PLANE_HOST=${CONTROL_PLANE_HOST:-0.0.0.0}
      - CONTROL_PLANE_PORT=${CONTROL_PLANE_PORT:-8010}
      # The Python service in this stack is named `backend`.
      - CONTROL_PLANE_PYTHON_API_BASE_URL=${CONTROL_PLANE_PYTHON_API_BASE_URL:-http://backend:8000}
      - CONTROL_PLANE_ENABLE_PYTHON_FALLBACK_PROXY=${CONTROL_PLANE_ENABLE_PYTHON_FALLBACK_PROXY:-true}
      - CONTROL_PLANE_LOG_LEVEL=${CONTROL_PLANE_LOG_LEVEL:-info}
      - CONTROL_PLANE_REQUEST_TIMEOUT_MS=${CONTROL_PLANE_REQUEST_TIMEOUT_MS:-300000}
      - CONTROL_PLANE_PROVIDERS_AUTHORITY=${CONTROL_PLANE_PROVIDERS_AUTHORITY:-python}
      - CONTROL_PLANE_PROVIDERS_CREDENTIALS_AUTHORITY=${CONTROL_PLANE_PROVIDERS_CREDENTIALS_AUTHORITY:-python}
      - CONTROL_PLANE_RUNS_AUTHORITY=${CONTROL_PLANE_RUNS_AUTHORITY:-python}
      - CONTROL_PLANE_POLICY_AUTHORITY=${CONTROL_PLANE_POLICY_AUTHORITY:-python}
      - CONTROL_PLANE_PROPOSALS_AUTHORITY=${CONTROL_PLANE_PROPOSALS_AUTHORITY:-python}
      - CONTROL_PLANE_SESSIONS_AUTHORITY=${CONTROL_PLANE_SESSIONS_AUTHORITY:-python}
      - CONTROL_PLANE_CHAT_TURN_AUTHORITY=${CONTROL_PLANE_CHAT_TURN_AUTHORITY:-python}
      - CONTROL_PLANE_CONTEXT_AUTHORITY=${CONTROL_PLANE_CONTEXT_AUTHORITY:-python}
      - CONTROL_PLANE_MEMORY_AUTHORITY=${CONTROL_PLANE_MEMORY_AUTHORITY:-python}
      - CONTROL_PLANE_MEMORY_APPLY_AUTHORITY=${CONTROL_PLANE_MEMORY_APPLY_AUTHORITY:-python}
      - CONTROL_PLANE_PROVIDERS_SHADOW=${CONTROL_PLANE_PROVIDERS_SHADOW:-false}
      - CONTROL_PLANE_DATABASE_URL=${CONTROL_PLANE_DATABASE_URL:-}
      - CONTROL_PLANE_INTERNAL_TOKEN=${CONTROL_PLANE_INTERNAL_TOKEN:-}
      - CONTROL_PLANE_CLI_TOOLS_ROOT=${CONTROL_PLANE_CLI_TOOLS_ROOT:-/aspace/runtime-tools}
      - TSC_WATCHFILE=${TSC_WATCHFILE:-PriorityPollingInterval}
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:8010/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))\""]
      start_period: 60s
      start_interval: 2s
      interval: 30s
      timeout: 5s
      retries: 3
    command: >
      sh -c "npm --prefix /app/packages/protocol run build -- --watch --preserveWatchOutput &
             npm run build -- --watch --preserveWatchOutput &
             node --watch dist/index.js"
    restart: unless-stopped

  frontend:
    build:
      context: ../../apps/web
      dockerfile: Dockerfile
      network: host
      target: dev
    ports:
      - "3000:5173"
    volumes:
      - ../../apps/web:/app
      - /app/node_modules
    environment:
      # Dev client entrypoint goes through the control plane (which falls back to
      # the Python backend). The backend port 8000 stays published for direct
      # debugging if needed.
      - CONTROL_PLANE_API_URL=${CONTROL_PLANE_API_URL:-http://control-plane:8010}
      - CHOKIDAR_USEPOLLING=true
    depends_on:
      control-plane:
        condition: service_healthy

  deployer:
    build:
      context: ../../deployer
      dockerfile: Dockerfile
      network: host
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ../../:/repo:rw
      - ${AGENT_SPACE_MODE_ROOT:-$HOME/.aspace/dev}:/aspace
    user: "1000:989"
    environment:
      - DEPLOYER_SOCKET=/aspace/run/deployer.sock
      - REPO_ROOT=/repo
      - AGENT_SPACE_HOME=/aspace
      - AGENT_SPACE_ENV=dev
    restart: unless-stopped
