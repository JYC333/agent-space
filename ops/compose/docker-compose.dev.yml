services:
  postgres:
    container_name: agent-space-dev-postgres
    image: postgres:${POSTGRES_MAJOR:-18}
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-agent_space}
      - POSTGRES_USER=${POSTGRES_USER:-agent_space}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-agent_space_dev_password}
      - PGDATA=/var/lib/postgresql/data
    volumes:
      - ${AGENT_SPACE_MODE_ROOT:-$HOME/.aspace/dev}/db/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-agent_space} -d ${POSTGRES_DB:-agent_space}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # Official server — the client-facing API entrypoint inside the compose network.
  server:
    build:
      context: ../../
      dockerfile: server/Dockerfile
      target: dev-runtime
      network: host
    container_name: agent-space-dev-server
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ../../server/src:/app/server/src:ro
      - ../../server/migrations:/app/server/migrations:ro
      - ../../server/tsconfig.json:/app/server/tsconfig.json:ro
      - ../../packages/protocol/src:/app/packages/protocol/src:ro
      - ${AGENT_SPACE_MODE_ROOT:-$HOME/.aspace/dev}:/aspace
    environment:
      - AGENT_SPACE_HOME=/aspace
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      - GOOGLE_REDIRECT_URI=${GOOGLE_REDIRECT_URI:-http://localhost:3000/api/v1/auth/google/callback}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:3000}
      - SESSION_EXPIRE_DAYS=${SESSION_EXPIRE_DAYS:-30}
      - SERVER_DEBUG=${SERVER_DEBUG:-false}
      - AGENT_SPACE_ENV=dev
      - SERVER_LOG_LEVEL=${SERVER_LOG_LEVEL:-info}
      - SERVER_REQUEST_TIMEOUT_MS=${SERVER_REQUEST_TIMEOUT_MS:-300000}
      - SERVER_DATABASE_URL=${SERVER_DATABASE_URL:-}
      - SERVER_INTERNAL_TOKEN=${SERVER_INTERNAL_TOKEN:-}
      - INSTANCE_ADMIN_EMAIL=${INSTANCE_ADMIN_EMAIL:-}
      - RUNTIME_TOOLS_ROOT=${RUNTIME_TOOLS_ROOT:-/aspace/runtime-tools}
      - HTTP_PROXY=${HTTP_PROXY:-}
      - HTTPS_PROXY=${HTTPS_PROXY:-}
      - ALL_PROXY=${ALL_PROXY:-}
      - NO_PROXY=${NO_PROXY:-localhost,127.0.0.1,postgres,server,frontend,deployer}
      - NPM_CONFIG_REGISTRY=${NPM_CONFIG_REGISTRY:-}
      - NPM_CONFIG_STRICT_SSL=${NPM_CONFIG_STRICT_SSL:-}
      - NPM_CONFIG_CAFILE=${NPM_CONFIG_CAFILE:-}
      - WORKSPACE_ROOT=${WORKSPACE_ROOT:-/aspace/workspaces}
      - SANDBOX_ROOT=${SANDBOX_ROOT:-/aspace/sandboxes}
      - DEPLOYER_SOCKET_PATH=${DEPLOYER_SOCKET_PATH:-/aspace/run/deployer.sock}
      - SERVER_DAILY_REPORT_SCHEDULER_ENABLED=${SERVER_DAILY_REPORT_SCHEDULER_ENABLED:-true}
      - SERVER_DAILY_REPORT_SCHEDULER_INTERVAL_SECONDS=${SERVER_DAILY_REPORT_SCHEDULER_INTERVAL_SECONDS:-60}
      - SERVER_AUTOMATION_SCHEDULER_ENABLED=${SERVER_AUTOMATION_SCHEDULER_ENABLED:-true}
      - SERVER_AUTOMATION_SCHEDULER_INTERVAL_SECONDS=${SERVER_AUTOMATION_SCHEDULER_INTERVAL_SECONDS:-60}
      - SERVER_MEMORY_ACCESS_LOG_RETENTION_ENABLED=${SERVER_MEMORY_ACCESS_LOG_RETENTION_ENABLED:-true}
      - SERVER_MEMORY_ACCESS_LOG_RETENTION_DAYS=${SERVER_MEMORY_ACCESS_LOG_RETENTION_DAYS:-90}
      - SERVER_MEMORY_ACCESS_LOG_PRUNE_INTERVAL_SECONDS=${SERVER_MEMORY_ACCESS_LOG_PRUNE_INTERVAL_SECONDS:-3600}
      - SERVER_INTAKE_EXTRACTION_SCHEDULER_ENABLED=${SERVER_INTAKE_EXTRACTION_SCHEDULER_ENABLED:-true}
      - SERVER_INTAKE_EXTRACTION_SCHEDULER_INTERVAL_SECONDS=${SERVER_INTAKE_EXTRACTION_SCHEDULER_INTERVAL_SECONDS:-30}
      - BACKUP_ENABLED=${BACKUP_ENABLED:-false}
      - BACKUP_ACCEPT_NO_BACKUP=${BACKUP_ACCEPT_NO_BACKUP:-false}
      - BACKUP_INTERVAL_HOURS=${BACKUP_INTERVAL_HOURS:-24}
      - BACKUP_RETENTION_COUNT=${BACKUP_RETENTION_COUNT:-7}
      - BACKUP_INCLUDE_LOGS=${BACKUP_INCLUDE_LOGS:-false}
      - BACKUP_ON_STARTUP=${BACKUP_ON_STARTUP:-true}
      - BACKUP_ROOT=${BACKUP_ROOT:-}
      - BACKUP_DATABASE_URL=${BACKUP_DATABASE_URL:-postgresql://${POSTGRES_USER:-agent_space}:${POSTGRES_PASSWORD:-agent_space_dev_password}@postgres:5432/${POSTGRES_DB:-agent_space}}
      - ARTIFACT_STORAGE_ROOT=${ARTIFACT_STORAGE_ROOT:-}
      - TSC_WATCHFILE=${TSC_WATCHFILE:-PriorityPollingInterval}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:8010/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))\""]
      start_period: 60s
      start_interval: 2s
      interval: 30s
      timeout: 5s
      retries: 3
    command: >
      sh -c "npm --prefix /app/packages/protocol run build -- --watch --preserveWatchOutput &
             npm run build -- --watch --preserveWatchOutput &
             node --watch dist/index.js"
    restart: unless-stopped

  frontend:
    build:
      context: ../../apps/web
      dockerfile: Dockerfile
      network: host
      target: dev
    ports:
      - "3000:5173"
    volumes:
      - ../../apps/web:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
    depends_on:
      server:
        condition: service_healthy

  deployer:
    build:
      context: ../../deployer
      dockerfile: Dockerfile
      network: host
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ../../:/repo:rw
      - ${AGENT_SPACE_MODE_ROOT:-$HOME/.aspace/dev}:/aspace
    user: "1000:989"
    environment:
      - DEPLOYER_SOCKET=/aspace/run/deployer.sock
      - REPO_ROOT=/repo
      - AGENT_SPACE_HOME=/aspace
      - AGENT_SPACE_ENV=dev
    restart: unless-stopped
