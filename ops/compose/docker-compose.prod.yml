services:
  postgres:
    container_name: agent-space-prod-postgres
    image: postgres:${POSTGRES_MAJOR:-18}
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-agent_space}
      - POSTGRES_USER=${POSTGRES_USER:-agent_space}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required for production}
      - PGDATA=/var/lib/postgresql/data
    volumes:
      - ${AGENT_SPACE_MODE_ROOT:-$HOME/.aspace/prod}/db/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-agent_space} -d ${POSTGRES_DB:-agent_space}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # Official server — the default production API entrypoint. nginx
  # proxies /api to this service (see apps/web/nginx.conf). Not published
  # externally — nginx (:80) is the public face. Production migrations and
  # official plugin server artifacts are bundled in the server image; do not
  # bind-mount live migration or plugin source files.
  server:
    build:
      context: ../../
      dockerfile: server/Dockerfile
      network: host
    container_name: agent-space-prod-server
    volumes:
      - ${AGENT_SPACE_MODE_ROOT:-$HOME/.aspace/prod}:/aspace
    env_file:
      - ${AGENT_SPACE_MODE_ROOT:-$HOME/.aspace/prod}/.server.env
    environment:
      - AGENT_SPACE_HOME=/aspace
      - AGENT_SPACE_ENV=prod
      - BACKUP_DATABASE_URL=${BACKUP_DATABASE_URL:-postgresql://${POSTGRES_USER:-agent_space}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required for production}@postgres:5432/${POSTGRES_DB:-agent_space}}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:8010/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))\""]
      start_period: 60s
      start_interval: 2s
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  frontend:
    build:
      context: ../../
      dockerfile: apps/web/Dockerfile
      network: host
      target: prod
    # nginx serves the built static bundle and proxies /api to the server
    # service (see apps/web/nginx.conf). Build context is the repo root because
    # official plugin frontend source lives under plugins/official/*/web.
    ports:
      - "80:80"
    depends_on:
      server:
        condition: service_healthy

  deployer:
    build:
      context: ../../deployer
      dockerfile: Dockerfile
      network: host
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ../../:/repo:rw
      - ${AGENT_SPACE_MODE_ROOT:-$HOME/.aspace/prod}:/aspace
    user: "1000:989"
    environment:
      - DEPLOYER_SOCKET=/aspace/run/deployer.sock
      - REPO_ROOT=/repo
      - AGENT_SPACE_HOME=/aspace
      - AGENT_SPACE_ENV=prod
    restart: unless-stopped
