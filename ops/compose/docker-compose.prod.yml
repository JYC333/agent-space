services:
  postgres:
    container_name: agent-space-prod-postgres
    image: postgres:${POSTGRES_MAJOR:-18}
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-agent_space}
      - POSTGRES_USER=${POSTGRES_USER:-agent_space}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required for production}
      - PGDATA=/var/lib/postgresql/data
    volumes:
      - ${AGENT_SPACE_MODE_ROOT:-$HOME/.aspace/prod}/db/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-agent_space} -d ${POSTGRES_DB:-agent_space}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  backend:
    build:
      context: ../../
      dockerfile: backend/Dockerfile
      network: host
      args:
        PG_MAJOR: ${POSTGRES_MAJOR:-18}
    volumes:
      - ${AGENT_SPACE_MODE_ROOT:-$HOME/.aspace/prod}:/aspace
    group_add:
      - "${DOCKER_GID:-989}"
    env_file:
      - ${AGENT_SPACE_MODE_ROOT:-$HOME/.aspace/prod}/.env
    environment:
      - AGENT_SPACE_HOME=/aspace
      - INSTANCE_ROOT=/aspace
      - STORAGE_ROOT=/aspace/storage
      - LOG_ROOT=/aspace/logs
      - CAPABILITIES_DIR=/app/capabilities
      - DATABASE_URL=${DATABASE_URL:-postgresql+psycopg://${POSTGRES_USER:-agent_space}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required for production}@postgres:5432/${POSTGRES_DB:-agent_space}}
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - DEPLOYER_SOCKET_PATH=/aspace/run/deployer.sock
      - CONTROL_PLANE_INTERNAL_URL=${CONTROL_PLANE_INTERNAL_URL:-http://control-plane:8010}
      - CONTROL_PLANE_INTERNAL_TOKEN=${CONTROL_PLANE_INTERNAL_TOKEN:-}
      - AGENT_SPACE_ENV=prod
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      start_period: 180s
      start_interval: 2s
      interval: 30s
      timeout: 5s
      retries: 3
    working_dir: /app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

  # Official TS control plane — the default production API entrypoint. nginx
  # proxies /api to this service (see apps/web/nginx.conf), and it proxies any
  # route it does not own to `backend` (Python). Not published externally —
  # nginx (:80) is the public face.
  control-plane:
    build:
      context: ../../
      dockerfile: control-plane/Dockerfile
      network: host
    container_name: agent-space-prod-control-plane
    volumes:
      - ${AGENT_SPACE_MODE_ROOT:-$HOME/.aspace/prod}:/aspace
    environment:
      - AGENT_SPACE_HOME=/aspace
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      - GOOGLE_REDIRECT_URI=${GOOGLE_REDIRECT_URI:-}
      - FRONTEND_URL=${FRONTEND_URL:-}
      - SESSION_EXPIRE_DAYS=${SESSION_EXPIRE_DAYS:-30}
      - DEBUG=${DEBUG:-false}
      - AGENT_SPACE_ENV=prod
      - CONTROL_PLANE_HOST=${CONTROL_PLANE_HOST:-0.0.0.0}
      - CONTROL_PLANE_PORT=${CONTROL_PLANE_PORT:-8010}
      - CONTROL_PLANE_PYTHON_API_BASE_URL=${CONTROL_PLANE_PYTHON_API_BASE_URL:-http://backend:8000}
      - CONTROL_PLANE_ENABLE_PYTHON_FALLBACK_PROXY=${CONTROL_PLANE_ENABLE_PYTHON_FALLBACK_PROXY:-true}
      - CONTROL_PLANE_LOG_LEVEL=${CONTROL_PLANE_LOG_LEVEL:-info}
      - CONTROL_PLANE_REQUEST_TIMEOUT_MS=${CONTROL_PLANE_REQUEST_TIMEOUT_MS:-300000}
      - CONTROL_PLANE_DATABASE_URL=${CONTROL_PLANE_DATABASE_URL:-}
      - CONTROL_PLANE_INTERNAL_TOKEN=${CONTROL_PLANE_INTERNAL_TOKEN:-}
      - CONTROL_PLANE_CLI_TOOLS_ROOT=${CONTROL_PLANE_CLI_TOOLS_ROOT:-/aspace/runtime-tools}
      - WORKSPACE_ROOT=${WORKSPACE_ROOT:-/aspace/workspaces}
      - SANDBOX_ROOT=${SANDBOX_ROOT:-/aspace/sandboxes}
      - DEPLOYER_SOCKET_PATH=${DEPLOYER_SOCKET_PATH:-/aspace/run/deployer.sock}
      - CONTROL_PLANE_DAILY_REPORT_SCHEDULER_ENABLED=${CONTROL_PLANE_DAILY_REPORT_SCHEDULER_ENABLED:-true}
      - CONTROL_PLANE_DAILY_REPORT_SCHEDULER_INTERVAL_SECONDS=${CONTROL_PLANE_DAILY_REPORT_SCHEDULER_INTERVAL_SECONDS:-60}
      - CONTROL_PLANE_AUTOMATION_SCHEDULER_ENABLED=${CONTROL_PLANE_AUTOMATION_SCHEDULER_ENABLED:-true}
      - CONTROL_PLANE_AUTOMATION_SCHEDULER_INTERVAL_SECONDS=${CONTROL_PLANE_AUTOMATION_SCHEDULER_INTERVAL_SECONDS:-60}
      - CONTROL_PLANE_MEMORY_ACCESS_LOG_RETENTION_ENABLED=${CONTROL_PLANE_MEMORY_ACCESS_LOG_RETENTION_ENABLED:-true}
      - CONTROL_PLANE_MEMORY_ACCESS_LOG_RETENTION_DAYS=${CONTROL_PLANE_MEMORY_ACCESS_LOG_RETENTION_DAYS:-90}
      - CONTROL_PLANE_MEMORY_ACCESS_LOG_PRUNE_INTERVAL_SECONDS=${CONTROL_PLANE_MEMORY_ACCESS_LOG_PRUNE_INTERVAL_SECONDS:-3600}
      - CONTROL_PLANE_INTAKE_EXTRACTION_SCHEDULER_ENABLED=${CONTROL_PLANE_INTAKE_EXTRACTION_SCHEDULER_ENABLED:-true}
      - CONTROL_PLANE_INTAKE_EXTRACTION_SCHEDULER_INTERVAL_SECONDS=${CONTROL_PLANE_INTAKE_EXTRACTION_SCHEDULER_INTERVAL_SECONDS:-30}
      - BACKUP_ENABLED=${BACKUP_ENABLED:-true}
      - BACKUP_ACCEPT_NO_BACKUP=${BACKUP_ACCEPT_NO_BACKUP:-false}
      - BACKUP_INTERVAL_HOURS=${BACKUP_INTERVAL_HOURS:-24}
      - BACKUP_RETENTION_COUNT=${BACKUP_RETENTION_COUNT:-7}
      - BACKUP_INCLUDE_LOGS=${BACKUP_INCLUDE_LOGS:-false}
      - BACKUP_ON_STARTUP=${BACKUP_ON_STARTUP:-true}
      - BACKUP_ROOT=${BACKUP_ROOT:-}
      - BACKUP_DATABASE_URL=${BACKUP_DATABASE_URL:-postgresql+psycopg://${POSTGRES_USER:-agent_space}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required for production}@postgres:5432/${POSTGRES_DB:-agent_space}}
      - ARTIFACT_STORAGE_ROOT=${ARTIFACT_STORAGE_ROOT:-}
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:8010/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))\""]
      start_period: 60s
      start_interval: 2s
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  frontend:
    build:
      context: ../../apps/web
      dockerfile: Dockerfile
      network: host
      target: prod
    # nginx serves the built static bundle and proxies /api to the control-plane
    # service (see apps/web/nginx.conf), which falls back to the Python backend.
    ports:
      - "80:80"
    depends_on:
      control-plane:
        condition: service_healthy

  deployer:
    build:
      context: ../../deployer
      dockerfile: Dockerfile
      network: host
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ../../:/repo:rw
      - ${AGENT_SPACE_MODE_ROOT:-$HOME/.aspace/prod}:/aspace
    user: "1000:989"
    environment:
      - DEPLOYER_SOCKET=/aspace/run/deployer.sock
      - REPO_ROOT=/repo
      - AGENT_SPACE_HOME=/aspace
      - AGENT_SPACE_ENV=prod
    restart: unless-stopped
