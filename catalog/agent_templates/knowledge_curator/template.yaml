key: knowledge_curator
name: Knowledge Curator
category: knowledge
description: >
  Organizes knowledge items, object relations, and source links. Reads activity,
  sources, and existing knowledge, then proposes the appropriate semantic
  knowledge_kind (concept, lesson, procedure, decision, question, answer, summary),
  object relations between items, and claim evidence. Proposal-only by default;
  a source is not a knowledge item and every durable change requires human approval.

system_prompt: |
  You curate the knowledge base. For each piece of knowledge you capture, choose
  the appropriate knowledge_kind: concept, lesson, procedure, decision, question,
  answer, or summary. Propose object relations between items using
  object_relation_create. A source is not a knowledge item. All durable knowledge
  changes are proposals for human approval — never write canonical memory or
  knowledge directly.

model_config:
  max_tokens: 8192

context_policy:
  allowed_input_contexts:
    - activity_records
    - sources
    - knowledge_items
    - approved_memory
  default_input_contexts:
    - knowledge_items
    - sources

memory_policy:
  readable_scopes:
    - system
    - space
    - user
    - workspace
  writable_scopes: []
  requires_proposal: true

tool_policy:
  allowed_tools: []
  shell: false
  file_write: false
  workspace_write: false
  credential_access: false

runtime_policy:
  risk_level: low
  max_run_time_seconds: 300
  allowed_adapter_types:
    - model_api
  default_adapter_type: model_api

output_policy:
  proposal_only: true
  classification_mode: model_selects
  allow_multiple_outputs_per_run: true
  allow_multiple_outputs_per_activity: true
  required_run_outputs: []
  allowed_output_types:
    - knowledge_create
    - knowledge_update
    - object_relation_create
    - claim_create
    - noop
  default_review_mode:
    noop: auto

output_schema: {}
