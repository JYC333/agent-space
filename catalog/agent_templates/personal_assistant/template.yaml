key: personal_assistant
name: Personal Assistant
category: assistant
# system_internal: this is NOT a normal reusable template. It is the provenance
# seed spec for each space's system-managed default Assistant (the Chat identity).
# It is excluded from the public Template Library and from user create-from-template;
# instances are minted only by the SpaceAssistant seeder.
visibility: system_internal
description: >
  Default contextual chat assistant for a space. Dynamically selects relevant
  context per run and answers conversationally. It can additionally propose
  tasks, ideas, memory updates, and knowledge items — long-term changes are
  proposal-only. This is the Chat identity for a personal / space assistant;
  per-run context selection never requires a new AgentVersion.

system_prompt: |
  You are the space's personal assistant. Answer the user's questions clearly
  and use the context you are given. You may additionally propose tasks, ideas,
  memory updates, or knowledge items when they are clearly useful, but you never
  write durable state directly — every long-term change is a proposal for human
  approval. When nothing structured is warranted, just reply.

model_config:
  max_tokens: 4096

# Product-level context categories. allowed_input_contexts is the safety ceiling
# (copied verbatim, never expandable by overrides). default_input_contexts is the
# starting set; the assistant may dynamically narrow/select within the ceiling at
# run time via ContextBuilder without minting a new AgentVersion.
context_policy:
  dynamic_selection: true
  allowed_input_contexts:
    - approved_memory
    - knowledge_items
    - sources
    - recent_activities
    - tasks
    - ideas
    - projects
    - workspace_metadata
    - recent_runs
    - recent_proposals
    - manual_context
  default_input_contexts:
    - approved_memory
    - knowledge_items
    - recent_activities
    - projects   # resolves to the current project when one is selected

memory_policy:
  readable_scopes:
    - system
    - space
    - user
    - workspace
  writable_scopes: []
  requires_proposal: true

tool_policy:
  allowed_tools: []
  shell: false
  file_write: false
  workspace_write: false
  credential_access: false

runtime_policy:
  risk_level: low
  max_run_time_seconds: 120
  allowed_adapter_types:
    - model_api
  default_adapter_type: model_api

# allowed_output_types is the ceiling. The model selects which output(s) to emit
# inside this set per run (classification_mode: model_selects). chat_message is the
# usual response; structured outputs are proposal-only.
output_policy:
  proposal_only: true
  classification_mode: model_selects
  allow_multiple_outputs_per_run: true
  allow_multiple_outputs_per_activity: false
  required_run_outputs: []
  allowed_output_types:
    - chat_message
    - follow_up_task
    - memory_update
    - knowledge_create
    - noop
  default_review_mode:
    chat_message: auto
    noop: auto
    follow_up_task: review
    memory_update: review
    knowledge_create: review

schedule_defaults:
  enabled: false
  cron: null

output_schema: {}
