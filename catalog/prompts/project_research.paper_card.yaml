asset_key: project_research.paper_card
display_name: Project Research Paper Card Prompt
description: Generates concise WHY, HOW, and WHAT cards from deep paper analysis.
content:
  schema_version: prompt_asset.v1
  prompt_type: workflow
  template: |-
    Project: {project_id}

    For every supplied paper, write an item summary with exactly three headings:
    WHY: why this paper matters to the project's research question.
    HOW: the study design, data, method, and important constraints.
    WHAT: the central result and the evidence that supports it.

    Each section must be at most 80 words. Derive every statement from the supplied
    excerpt or extracted text. Preserve the source_item_id and return the enclosing
    source-post-processing JSON contract exactly; do not add prose outside JSON.
  variables_schema:
    type: object
    required: [project_id]
    properties:
      project_id: { type: string }
  output_schema: {}
  model_config: {}
  rendering: { engine: plain }
  safety:
    untrusted_data_delimiters: false
    requires_proposal_for_promotion: false
