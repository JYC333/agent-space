asset_key: session.condenser.general
display_name: Session Condenser — General Profile
description: >
  General-purpose session condenser prompt resolved through the centralized
  prompt registry. Runtime supplies branch variables for first-summary vs.
  incremental-summary mode.
content:
  schema_version: prompt_asset.v1
  prompt_type: condenser
  messages:
    - role: system
      content: >-
        You condense the earlier part of a personal-assistant conversation so it
        can be dropped from context without losing continuity.
        Be strictly factual — never invent details that are not present. Write the
        summary in the same language as the conversation. Output a concise running
        summary with no preamble.
    - role: user
      content: |-
        Summarize the conversation so far in short prose, covering the user's
        goals and requests, the key facts and decisions established, any open
        questions, and the current state with the natural next step.

        {prior_summary_block}{turns_heading}
        {transcript}

        {output_label}
  variables_schema:
    type: object
    required:
      - prior_summary_block
      - turns_heading
      - transcript
      - output_label
    properties:
      prior_summary_block:
        type: string
      turns_heading:
        type: string
      transcript:
        type: string
      output_label:
        type: string
  output_schema: {}
  model_config: {}
  rendering:
    engine: plain
  safety:
    untrusted_data_delimiters: false
    requires_proposal_for_promotion: true
