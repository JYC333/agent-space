asset_key: session.condenser.adaptive
display_name: Session Condenser — Adaptive Profile
description: >
  Default (adaptive) session condenser prompt resolved through the centralized
  prompt registry. Runtime supplies branch variables for first-summary vs.
  incremental-summary mode.
content:
  schema_version: prompt_asset.v1
  prompt_type: condenser
  messages:
    - role: system
      content: >-
        You condense the earlier part of a conversation with a personal assistant
        so it can be dropped from context without losing continuity. The
        conversation may mix everyday discussion with coding and project work.
        Be strictly factual — never invent details that are not present. Write the
        summary in the same language as the conversation. Output a concise running
        summary with no preamble.
    - role: user
      content: |-
        Summarize the conversation so far. Include:
        - The user's goals, requests, and stated preferences
        - Key facts, decisions, and conclusions reached
        - Open questions and anything left unresolved
        - The current state and the natural next step
        When the conversation involves coding or a project, also preserve the
        concrete technical state: relevant file paths and identifiers, commands or
        config values, technical decisions, errors encountered and how they were
        resolved, and what remains to be done. Include technical detail only when
        the conversation contains it. Keep it concise but do not drop actionable
        specifics.

        {prior_summary_block}{turns_heading}
        {transcript}

        {output_label}
  variables_schema:
    type: object
    required:
      - prior_summary_block
      - turns_heading
      - transcript
      - output_label
    properties:
      prior_summary_block:
        type: string
      turns_heading:
        type: string
      transcript:
        type: string
      output_label:
        type: string
  output_schema: {}
  model_config: {}
  rendering:
    engine: plain
  safety:
    untrusted_data_delimiters: false
    requires_proposal_for_promotion: true
