asset_key: project_research.synthesis
display_name: Project Research Synthesis Prompt
description: >
  Registry-managed synthesis prompt for the Project Research workflow. The
  semantic rejection envelope lets the model report an actionable input problem
  without falling back to prose or markdown.
content:
  schema_version: prompt_asset.v1
  prompt_type: workflow
  template: |-
    Project: {project_id}
    Research question: {research_question}
    Report depth: {report_depth}
    Critique to address: {critique_context}
    Use only the approved project corpus and its evidence. Do not invent citations.
    Return exactly one JSON object using this envelope: status, artifacts, rejection. Do not return Markdown, XML/reasoning tags, or prose outside the JSON object.
    For a successful synthesis, use status="succeeded", rejection=null, and include exactly one artifact.
    Reject only as a last resort: if the research question is vague or meaningless, or the approved corpus contains nothing topically related to it at all, do not invent a theme and do not ask a follow-up question in prose. Use status="rejected", artifacts=[], and a rejection object with code, message, reason, and at least one concrete suggestions item.
    Partial or indirect evidence is NOT a rejection reason. When approved items relate to the topic without answering the question directly, produce a succeeded report that synthesizes what the evidence does show, names each source's specific relevance gap in its relevance field, records the absence of direct evidence as an explicit research-gap finding, and lists what direct evidence would be needed in limitations.
    Allowed rejection codes: research_question_not_actionable, insufficient_approved_corpus, no_coherent_synthesis_target.
    Example for question `test` with a corpus containing unrelated papers: {"status":"rejected","artifacts":[],"rejection":{"code":"research_question_not_actionable","message":"The research question does not define an actionable synthesis target.","reason":"The value `test` is too vague to connect the approved papers into a defensible synthesis.","suggestions":["Provide a specific research question or thematic lens.","Select the source items that should be synthesized together.","Request per-paper summaries if a cross-paper synthesis is not intended."]}}
    The required success artifact is research_report.archive.v1. It must contain title, artifact_type, mime_type, and content. Content must be one JSON object, never Markdown, a code fence, prose, or a JSON-encoded string.
    The content object must contain schema_version="research_report.v1", research_question, summary, findings (claim, support, references), sources (title, authors, year, relevance, summary, references), limitations, and ideas (title, problem, novelty, testability, references).
    Every finding, source row, and idea must include source_item_id/evidence_id/object_id/doi/arxiv_id references.
    Reference ids must be copied verbatim from the corpus context as complete identifiers; never shorten, truncate, or reformat an id.
    Disclose material evidence on both sides of a contradiction. In each finding's support, state the evidence strength as abstract-only, full-text, or multi-source. Record the retrieval strategy and evidence coverage window in limitations.
    For report_depth="quick", keep the summary concise, emit at most five findings, and allow ideas to be empty. For report_depth="full", produce the complete defensible synthesis.
    When critique_context is not "none", revise the report to address every listed issue without inventing new evidence.
  variables_schema:
    type: object
    required:
      - project_id
      - research_question
      - report_depth
      - critique_context
    properties:
      project_id:
        type: string
      research_question:
        type: string
      report_depth:
        type: string
      critique_context:
        type: string
  output_schema: {}
  model_config: {}
  rendering:
    engine: plain
  safety:
    untrusted_data_delimiters: false
    requires_proposal_for_promotion: true
