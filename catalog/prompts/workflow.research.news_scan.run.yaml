asset_key: workflow.research.news_scan.run
display_name: News Scan Workflow Run Prompt
description: >
  Run prompt template for the built-in news scan workflow.
content:
  schema_version: prompt_asset.v1
  prompt_type: workflow
  template: |-
    Workflow: {workflow_name}
    Workflow template: {workflow_template_id}
    Workflow preset: {workflow_preset_name}

    {workflow_description}
    {research_question_section}{source_mode_section}
    Capabilities:
    {capabilities}

    Expected outputs:
    {expected_outputs}

    Use the workflow template and saved preset/request configuration as the run contract. Persist durable memory changes through proposals only.
  variables_schema:
    type: object
    required:
      - workflow_name
      - workflow_template_id
      - workflow_preset_name
      - workflow_description
      - research_question_section
      - source_mode_section
      - capabilities
      - expected_outputs
    properties:
      workflow_name:
        type: string
      workflow_template_id:
        type: string
      workflow_preset_name:
        type: string
      workflow_description:
        type: string
      research_question_section:
        type: string
      source_mode_section:
        type: string
      capabilities:
        type: string
      expected_outputs:
        type: string
  output_schema: {}
  model_config: {}
  rendering:
    engine: plain
  safety:
    untrusted_data_delimiters: false
    requires_proposal_for_promotion: true
