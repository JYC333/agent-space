asset_key: session.condenser.project
display_name: Session Condenser — Project Profile
description: >
  Project-oriented session condenser prompt resolved through the centralized
  prompt registry. Runtime supplies branch variables for first-summary vs.
  incremental-summary mode.
content:
  schema_version: prompt_asset.v1
  prompt_type: condenser
  messages:
    - role: system
      content: >-
        You summarize project-oriented conversations. Your summary replaces the
        earlier conversation, so it must preserve the project's state and direction.
        Be strictly factual — never invent details that are not present. Write the
        summary in the same language as the conversation. Output a concise running
        summary with no preamble.
    - role: user
      content: |-
        Summarize the conversation so far. Include:
        - The project objective and scope
        - Decisions made and their rationale
        - Milestones or tasks: done vs. remaining
        - Blockers, risks, and open questions
        - Owners and deadlines if mentioned
        - Current status and the next step
        Be concise but keep all actionable specifics.

        {prior_summary_block}{turns_heading}
        {transcript}

        {output_label}
  variables_schema:
    type: object
    required:
      - prior_summary_block
      - turns_heading
      - transcript
      - output_label
    properties:
      prior_summary_block:
        type: string
      turns_heading:
        type: string
      transcript:
        type: string
      output_label:
        type: string
  output_schema: {}
  model_config: {}
  rendering:
    engine: plain
  safety:
    untrusted_data_delimiters: false
    requires_proposal_for_promotion: true
