[pytest]
# AGENT_SPACE_HOME: tests/conftest.py isolates before app import (see that file).
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function
# Default run: skip tests marked not_ready (not yet implemented surfaces).
#   pytest --override-ini addopts=
# Run not_ready only: pytest -m not_ready
addopts = -m "not not_ready"
markers =
    not_ready: behavior or persistence not implemented in the canonical schema yet
    durable_audit: HTTP test verifies independently committed PolicyDecisionRecord rows
